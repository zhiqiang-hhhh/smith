name: My Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOEXPERIMENT: greenteagc
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags "-s -w -X github.com/zhiqiang-hhhh/smith/internal/version.Version=${VERSION}" -o "smith${EXT}" .
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "smith-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "smith${EXT}"
          else
            tar czf "smith-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "smith${EXT}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: smith-${{ matrix.goos }}-${{ matrix.goarch }}
          path: smith-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" smith-*.tar.gz smith-*.zip --generate-notes -R "${{ github.repository }}"
