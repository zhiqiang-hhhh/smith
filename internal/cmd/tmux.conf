# crush embedded tmux config — no prefix, transparent key passthrough.
# This config is used when crush auto-starts a dedicated tmux session.
# Customize freely — crush will not overwrite this file once created.
# Compatible with both tmux (Linux/macOS) and psmux (Windows).

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g escape-time 0
set -g focus-events on
set -g allow-passthrough on
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on
set -g aggressive-resize on
set -g visual-bell off
set -g mouse on
bind -n WheelUpPane   if -Ft= '#{mouse_any_flag}' 'send-keys -M' 'copy-mode -e'
bind -n WheelDownPane if -Ft= '#{mouse_any_flag}' 'send-keys -M' ''
set -g prefix None
set -g prefix2 None
set -g detach-on-destroy off
set -g renumber-windows on

# Status bar — catppuccin-inspired rounded pills
set -g status on
set -g status-position top
set -g status-style 'bg=#1a1a2e,fg=#c0caf5'
set -g status-left '#[fg=#00A4FF,bold] C #[default]'
set -g status-left-length 5
set -g status-right ''
set -g status-right-length 0
set -g status-justify left
set -g window-status-format '#[fg=#2a2a3e,bg=#1a1a2e]#[fg=#636da6,bg=#2a2a3e] #I  #W #[fg=#2a2a3e,bg=#1a1a2e]'
set -g window-status-current-format '#[fg=#00A4FF,bg=#1a1a2e]#[fg=#1a1a2e,bold,bg=#00A4FF] #I #[fg=#00A4FF,bg=#24283b]#[fg=#c0caf5,bold,bg=#24283b] #W #[fg=#24283b,bg=#1a1a2e]'
set -g window-status-separator ''

# C-j / C-k → Down / Up
bind -n C-j send-keys Down
bind -n C-k send-keys Up

# C-h / C-l → Left / Right
bind -n C-h send-keys Left
bind -n C-l send-keys Right

# C-o → C-k (kill to end of line, since C-k is remapped above)
bind -n C-o send-keys C-k

# Tab cycling
bind -n S-F9 previous-window
bind -n S-F10 next-window
bind -n M-9 previous-window
bind -n M-0 next-window

# Direct window switching (Alt-1 through Alt-8)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
